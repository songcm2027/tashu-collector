name: Collect Tashu snapshots
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: tashu-collect
  cancel-in-progress: false
jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Poll the API
        env:
          TASHU_SERVICE_KEY: ${{ secrets.TASHU_SERVICE_KEY }}
        run: python collect.py
      - name: Commit data
        run: |
          git config user.name "tashu-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new data."
          else
            git commit -m "data: $(date -u +'%Y-%m-%dT%H:%MZ')"
            git pull --rebase --autostash origin "${{ github.ref_name }}" || true
            git push
          fi
